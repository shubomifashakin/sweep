name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - GOOS: windows
            GOARCH: amd64
            ext: .exe
          - GOOS: linux
            GOARCH: amd64
            ext: ""
          - GOOS: darwin
            GOARCH: amd64
            ext: ""
          - GOOS: darwin
            GOARCH: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
        run: go build -o sweep-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.ext }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: sweep-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.ext }}
